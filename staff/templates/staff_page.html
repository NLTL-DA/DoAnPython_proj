                        <div class="kpi-value">{{ total_staff }}</div>
                        <div class="kpi-subtext text-muted">Đang làm việc</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">

                        <div class="kpi-title">Bếp</div>

                        <div class="kpi-subtext text-muted">Bếp trưởng & phụ bếp</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">

                    <div>

                        <div class="kpi-value">{{ waiter_count }}</div>
                        <div class="kpi-subtext text-muted">Nhân viên bàn</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="kpi-card">

                    <div>
                        <div class="kpi-title">Tổng Lương/Tháng</div>
                        <div class="kpi-value">{{ total_salary|floatformat:0 }} đ</div>
                        <div class="kpi-subtext text-muted">Chi phí nhân sự</div>
                    </div>
                </div>
            </div>
