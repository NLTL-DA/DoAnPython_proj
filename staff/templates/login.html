<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Seafood Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style>
        body {
            /* Hình nền hải sản chất lượng cao từ Unsplash */
            background-image: url('https://images.unsplash.com/photo-1551244072-5d12893278ab?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .restaurant-title {
            color: #0077b6; 
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ced4da;
        }

        .form-control:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 0.25rem rgba(0, 119, 182, 0.25);
        }

        .btn-seafood {
            background-color: #0077b6;
            border: none;
            width: 100%;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-seafood:hover {
            background-color: #03045e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(3, 4, 94, 0.4);
        }
    </style>
</head>
<body>
    <div class="login-card">
        
        {% if error_message %}
            <div class="alert alert-danger text-center fw-bold" role="alert">
                {{ error_message }}
            </div>
        {% endif %}
        
        <h2 class="restaurant-title">Ocean Bounty</h2>
        <p class="subtitle">Hệ thống quản lý nhà hàng Hải sản</p>
        
        <form id="loginForm" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-bold text-dark">Tên đăng nhập</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tên tài khoản..." required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-bold text-dark">Mật khẩu</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <button type="submit" class="btn btn-seafood text-white mt-2">Đăng Nhập</button>
        </form>
    </div>
        <script>
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault(); // Ngăn reload trang 

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/api/staff/login/", {
                
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                // Lưu token
                localStorage.setItem("token", data.token);

                //Chuyển trang hiện tại dang test
                window.location.href = "/dashboard/";
            } else {
                const errorDiv = document.getElementById("error");
                errorDiv.classList.remove("d-none");
                errorDiv.innerText = data.error || "Login failed";
            }
        });
    </script>
</body>
</html>
